version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      payload:
        patterns:
          - "@payloadcms/*"
          - "payload"
      supabase:
        patterns:
          - "@supabase/*"
      sentry:
        patterns:
          - "@sentry/*"
      types:
        patterns:
          - "@types/*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
