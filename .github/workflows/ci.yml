name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.19.4
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  SKIP_ENV_VALIDATION: "true"
  # Some transitive deps (e.g. eslint-visitor-keys@5) require Node
  # >=20.19, so we pin a recent 20.x LTS. Corepack on older Node 20
  # also shipped outdated pnpm signing keys; we both upgrade corepack
  # at install time and relax its strict/signature checks as a
  # belt-and-braces fallback.
  COREPACK_ENABLE_STRICT: "0"
  COREPACK_ENABLE_SIGNATURES: "0"

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Upgrade corepack + activate pnpm
        run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
          pnpm --version
      - run: pnpm install --frozen-lockfile

  format:
    name: Format
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck

  unit-tests:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run test:unit
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage/**"
          retention-days: 7

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
        # `SKIP_ENV_VALIDATION=true` is already in `env:` above. Without
        # real Supabase/Cloudinary/Upstash creds in CI we'd otherwise
        # crash at module-load time via `@t3-oss/env-nextjs`.

  # E2E (Playwright) still runs locally only — it needs a live
  # database + Cloudinary cloud, which we don't wire up in CI yet.
  # Run with `pnpm --filter @cct/web test:e2e`.
